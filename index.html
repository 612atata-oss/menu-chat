<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIメニュー案内</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    #chat {
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      height: 300px;
      overflow-y: auto;
    }
    .user { text-align: right; margin: 5px 0; }
    .ai { text-align: left; margin: 5px 0; color: #333; }
    input, button {
      padding: 8px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>AIメニュー案内</h2>

<div id="chat"></div>

<input id="input" type="text" placeholder="例：おすすめは？" size="30">
<button onclick="send()">送信</button>

<script>
const MENU_TEXT = `
【ドリンク】
・生ビール 550円
・ハイボール 480円
・レモンサワー 450円

【料理】
・唐揚げ 680円
・枝豆 380円
・焼き鳥（もも）180円
`;

async function send() {
  const input = document.getElementById("input");
  const message = input.value;
  if (!message) return;

  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="user">🧑 ${message}</div>`;
  input.value = "";

  const res = await fetch("https://menu-ai-worker.612arata.workers.dev/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: message,
      menu: MENU_TEXT
    })
  });

  const data = await res.json();
  chat.innerHTML += `<div class="ai">🤖 ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
