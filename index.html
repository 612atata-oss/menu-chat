<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AIメニュー相談</title>

  <!-- スマホ最重要 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    /* 全体レイアウト */
    .app {
      max-width: 480px;
      height: 100svh;
      margin: 0 auto;
      background: #ffffff;
      display: flex;
      flex-direction: column;
    }

    /* ヘッダー */
    .header {
      padding: 12px;
      text-align: center;
      font-weight: 600;
      background: #222;
      color: #fff;
      font-size: 16px;
    }

    /* メッセージエリア */
    .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #fafafa;
    }

    .message {
      max-width: 85%;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.ai {
      background: #e9e9eb;
      align-self: flex-start;
    }

    .message.user {
      background: #007aff;
      color: #fff;
      align-self: flex-end;
    }

    /* 入力欄 */
    .input-area {
      display: flex;
      padding: 8px;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    .input-area input {
      flex: 1;
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    .input-area button {
      margin-left: 8px;
      padding: 0 16px;
      font-size: 15px;
      border-radius: 20px;
      border: none;
      background: #007aff;
      color: #fff;
      cursor: pointer;
    }

    .input-area button:disabled {
      background: #aaa;
    }
  </style>
</head>

<body>

<div class="app">
  <div class="header">
    🤖 AIメニュー相談
  </div>

  <div id="messages" class="messages">
    <div class="message ai">
      こんにちは！<br>
      食べたいもの・お酒・好みを自由に聞いてください。
    </div>
  </div>

  <div class="input-area">
    <input
      id="input"
      type="text"
      placeholder="例：ビールに合う料理は？"
      autocomplete="off"
    />
    <button id="sendBtn">送信</button>
  </div>
</div>

<script>
  const WORKER_URL = "https://menu-ai-worker.612arata.workers.dev";

  const messages = document.getElementById("messages");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";
    sendBtn.disabled = true;

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      addMessage(data.reply || "（返答がありません）", "ai");

    } catch (e) {
      addMessage("通信エラーが発生しました", "ai");
    }

    sendBtn.disabled = false;
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
